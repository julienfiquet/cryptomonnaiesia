<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommandations Crypto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1e1e1e;
            color: white;
        }
        h1 {
            color: #f1c40f;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #333;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            font-size: 18px;
        }
    </style>
    
</head>
<body>
    <h1>Top 5 Cryptos à Acheter</h1>
    <ul id="crypto-list"></ul>

    <script>
        fetch("http://127.0.0.1:5001/recommend")
    .then(response => response.json())
    .then(data => {
        let list = document.getElementById("crypto-list");
        data.forEach(crypto => {
            let item = document.createElement("li");
            item.innerHTML = `<strong>${crypto.name} (${crypto.symbol.toUpperCase()})</strong><br>
                              💰 Prix : $${crypto.current_price} <br>
                              📉 Variation : ${crypto.change} <br>
                              📊 Volume : ${crypto.volume}`;
            list.appendChild(item);
        });
    })
    .catch(error => console.error("Erreur :", error));
    </script>
</body>
</html>
