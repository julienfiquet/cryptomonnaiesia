<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }
        
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(50%);
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .crypto-prices {
            margin-top: 20px;
            font-size: 1.2em;
            transition: transform 0.5s ease-in-out;
        }
        
        .crypto-prices:hover {
            transform: scale(1.05);
        }
        
        .chart-container {
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
        }
        
        .chat-box {
            margin-top: 30px;
            width: 60%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
        }
        
        .chat-box:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            transition: all 0.3s ease-in-out;
        }
        
        input:focus {
            outline: none;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <video autoplay muted loop class="background-video">
        <source src="video.mp4" type="video/mp4">
        Votre navigateur ne supporte pas les vidéos HTML5.
    </video>
    
    <div class="container">
        <h1>Crypto AI Analysis</h1>
        <p>Posez vos questions sur les cryptomonnaies</p>
        
        <div class="crypto-prices" id="crypto-prices">
            Chargement des prix...
        </div>
        
        <div class="chart-container">
            <canvas id="cryptoChart"></canvas>
        </div>
        
        <div class="chat-box">
            <input type="text" id="user-input" placeholder="Posez votre question ici...">
        </div>
    </div>
    
    <script>
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('crypto-prices').innerHTML = `
                    Bitcoin: $${data.bitcoin.usd} | 
                    Ethereum: $${data.ethereum.usd} | 
                    Ripple: $${data.ripple.usd}
                `;
            } catch (error) {
                document.getElementById('crypto-prices').innerText = 'Erreur de chargement des prix';
            }
        }
        
        fetchCryptoPrices();
        setInterval(fetchCryptoPrices, 60000);
        
        // Chart.js Graphique Crypto
        const ctx = document.getElementById('cryptoChart').getContext('2d');
        const cryptoChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1h', '3h', '6h', '12h', '24h'],
                datasets: [{
                    label: 'Bitcoin Price ($)',
                    data: [40000, 40500, 41000, 41500, 42000],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>
</body>
</html>
